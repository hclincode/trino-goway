# Trino coordinator config for the differential harness, mounted at
# /etc/trino/config.properties (replacing the image default). Mirrors the
# image's single-node default (references/trino/core/docker/default/etc/
# config.properties) plus the one customization the harness needs:
#
#   http-server.process-forwarded=true
#
# Both gateways inject X-Forwarded-* headers on every upstream request
# (internal/proxy/headers.go::injectHeaders, matching Java
# ProxyRequestHandler.addForwardedHeaders). Without process-forwarded, Trino
# rejects every proxied request with "HTTP ERROR 406 Server configuration does
# not allow processing of the X-Forwarded-For header". trino-gateway's own
# integration tests set this same flag for the same reason
# (references/trino-gateway/gateway-ha/src/test/resources/trino-config.properties).
coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080
catalog.management=${ENV:CATALOG_MANAGEMENT}

http-server.process-forwarded=true
