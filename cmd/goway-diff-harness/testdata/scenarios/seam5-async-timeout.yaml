# Seam 5 — Async statement polling honors Trino's nextUri loop without the
# gateway interfering with the long-poll semantics.
#
# Java reference: ProxyRequestHandler does not transform nextUri or inject
#                 timeouts on async polls; the client follows nextUri until
#                 Trino omits the field.
# Go reference:   internal/proxy/forward.go streams the upstream response
#                 verbatim (Hard Invariant #1); the recovery chain is queryId
#                 aware so each poll hits the same backend.
#
# Live-mode observability: SELECT 1 completes within a few polls. We loop GET
# on nextUri until the field is absent (max 20 iterations as a safety net).
# Both gateways MUST converge on a terminal response with the same shape.
#
# Diff policy notes:
#   - Date, Content-Length, Server, Set-Cookie: per-request / per-instance.
#     [JUSTIFIED]
#   - id, nextUri, infoUri, partialCancelUri: queryId varies. [JUSTIFIED]
#   - stats.*Millis / stats.* counters: timing- and execution-shape-dependent.
#     [JUSTIFIED]
#   - stats.state: even at terminal we may see FINISHED vs FINISHING depending
#     on whether the final flush has landed; the seam is "loop terminates",
#     not "exact state value". [JUSTIFIED]
#   - data: SELECT 1 returns [[1]] eventually but on the terminal poll the
#     data array may be absent if it was streamed in an earlier poll. The
#     diff is shape-of-the-loop, not data-payload. [JUSTIFIED]
#   - warnings: non-deterministic. [JUSTIFIED]
name: seam5-async-timeout
description: POST /v1/statement then poll nextUri until terminal; assert both gateways drive Trino's statement protocol to completion with equivalent shape
steps:
  - method: POST
    path: /v1/statement
    headers:
      X-Trino-User: diff-harness
      Content-Type: text/plain
    body: "SELECT 1"
    extract:
      nextUri: $.nextUri
  - method: GET
    pathFromVar: nextUri
    headers:
      X-Trino-User: diff-harness
    extract:
      nextUri: $.nextUri
    repeatUntil:
      noField: nextUri
      maxIterations: 20
diff:
  ignoreHeaders:
    - Date  # [JUSTIFIED] per-request wall clock; never equal across two live calls
    - Content-Length  # [JUSTIFIED] drifts after host:port rewrite; body itself is still fully diffed
    - Server  # [JUSTIFIED] Jetty vs net/http; not part of any gateway API contract
    - Set-Cookie  # [JUSTIFIED] Java may emit JSESSIONID/TG.* per session config; cookie wire-compat asserted positively in seam7
  ignoreBodyFields:
    - id  # [JUSTIFIED] Trino mints a fresh queryId per submission; cannot match across two runs
    - nextUri  # [JUSTIFIED] embeds the per-run queryId; shape/presence still asserted
    - infoUri  # [JUSTIFIED] embeds the per-run queryId
    - partialCancelUri  # [JUSTIFIED] embeds the per-run queryId
    - stats.elapsedTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.queuedTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.cpuTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.wallTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.finishingTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.planningTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.analysisTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.rootStage  # [JUSTIFIED] execution per-stage detail tree; RECURSIVE (subStages nest StageStats each w/ own timers) so per-leaf timer enumeration is incomplete+brittle to query/version change; poll-timing-dependent (state/done/timers), same class as top-level stats.state — not a client contract (clients read top-level stats: state/progressPercentage/completedSplits/nodes)
    - stats.processedRows  # [JUSTIFIED] execution-shape-dependent stat
    - stats.processedBytes  # [JUSTIFIED] execution-shape-dependent stat
    - stats.peakMemoryBytes  # [JUSTIFIED] execution-shape-dependent stat
    - stats.physicalInputBytes  # [JUSTIFIED] execution-shape-dependent stat
    - stats.state  # [JUSTIFIED] poll-timing dependent (QUEUED/RUNNING/FINISHED)
    - data  # [JUSTIFIED] row may stream in an earlier poll; terminal payload presence is non-deterministic
    - warnings  # [JUSTIFIED] Trino's warning emitter is non-deterministic across runs
  rewriteHostPort: true
