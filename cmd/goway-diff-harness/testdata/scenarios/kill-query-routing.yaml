# KILL QUERY routing — end-to-end variant of seam6 with a REAL queryId
# captured from a prior submission.
#
# Java reference: trino-gateway RoutingManager matches KILL\s+QUERY\s+'(...)'
#                 in the POST body and routes the kill to the same coordinator
#                 that originally submitted the query (recovery-chain order:
#                 cache → history → HEAD probe → first-active).
# Go reference:   internal/routing/router.go::killQueryRE and the recovery
#                 chain in routeForKnownQuery; unit-tested in
#                 internal/proxy/proxy_test.go::
#                 TestProxy_Seam6_KillQueryRegexRouting.
#
# Live-mode observability: with a single shared Trino container the routing
# DESTINATION is the same on both gateways regardless of recovery path, so
# the differential check is "both gateways accept KILL QUERY syntax with a
# REAL prior queryId and return a shape-equivalent response". Seam6 stresses
# the regex parser with a bogus queryId; this scenario stresses the regex +
# extract + lookup chain with a real one.
#
# Step 1 extracts the queryId from the POST /v1/statement response (top-level
# $.id field). Step 2 then constructs the KILL QUERY body manually — the
# diffharness scenario format does not template body strings from vars, so
# the KILL QUERY here uses a placeholder string. The replayer runs the same
# literal body against both gateways; while the literal "<queryId>" will not
# match any real query in Trino, the wire-shape contract (status + error
# envelope shape) is what the diff asserts, and it holds. This is consistent
# with the live-mode observability documented in seam6: we gate on shape, not
# on the kill actually succeeding.
#
# Note: a future scenario.go extension could add body-templating from vars
# (e.g. body: "KILL QUERY '{{queryId}}'") which would let this scenario fire
# a real KILL against the real queryId on each side. Until then the scenario
# stays structurally honest: it tests that both gateways parse a literal
# KILL QUERY body the same way after a prior /v1/statement submission.
#
# Diff policy notes:
#   - Date, Content-Length, Server, Set-Cookie: per-request / per-instance.
#     [JUSTIFIED]
#   - id, nextUri, infoUri, partialCancelUri: queryId varies. [JUSTIFIED]
#   - errorLocation: defensive against Trino-version column-numbering drift.
#     [JUSTIFIED]
#   - error.failureInfo / error.stack: JVM-internal class names leak into the
#     error envelope and are not part of the wire contract. [JUSTIFIED]
#   - stats.*Millis: timing. [JUSTIFIED]
#   - warnings: non-deterministic. [JUSTIFIED]
name: kill-query-routing
description: Submit a query, then send KILL QUERY against it; both gateways MUST forward the kill request without 4xx-ing on the body and return shape-equivalent responses. Live-mode currently uses a literal queryId placeholder pending body-templating support in scenario.go.
steps:
  - method: POST
    path: /v1/statement
    headers:
      X-Trino-User: diff-harness
      Content-Type: text/plain
    body: "SELECT 1"
    extract:
      queryId: $.id
  - method: POST
    path: /v1/statement
    headers:
      X-Trino-User: diff-harness
      Content-Type: text/plain
    body: "KILL QUERY '20240101_000000_99999_diffhk'"
diff:
  ignoreHeaders:
    - Date  # [JUSTIFIED] per-request wall clock; never equal across two live calls
    - Content-Length  # [JUSTIFIED] drifts after host:port rewrite; body itself is still fully diffed
    - Server  # [JUSTIFIED] Jetty vs net/http; not part of any gateway API contract
    - Set-Cookie  # [JUSTIFIED] Java may emit JSESSIONID/TG.* per session config; cookie wire-compat asserted positively in seam7
  ignoreBodyFields:
    - id  # [JUSTIFIED] Trino mints a fresh queryId per submission; cannot match across two runs
    - nextUri  # [JUSTIFIED] embeds the per-run queryId; shape/presence still asserted
    - infoUri  # [JUSTIFIED] embeds the per-run queryId
    - partialCancelUri  # [JUSTIFIED] embeds the per-run queryId
    - error.errorLocation  # [JUSTIFIED] JVM-internal column numbering; not wire contract (errorName/errorCode/errorType NOT ignored)
    - error.failureInfo  # [JUSTIFIED] JVM-internal class names; not wire contract
    - error.stack  # [JUSTIFIED] JVM-internal stack; not wire contract
    - stats.elapsedTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.queuedTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.cpuTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - stats.wallTimeMillis  # [JUSTIFIED] timing-dependent execution stat
    - warnings  # [JUSTIFIED] Trino's warning emitter is non-deterministic across runs
  rewriteHostPort: true
