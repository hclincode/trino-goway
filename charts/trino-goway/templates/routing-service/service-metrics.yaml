{{- if .Values.routingService.enabled }}
{{- $svc := .Values.routingService.service.metrics -}}
{{- /* Prometheus scrape target for the routing-service /metrics endpoint. */ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trino-goway.routingService.fullname" . }}-metrics
  labels:
    {{- include "trino-goway.routingService.labels" . | nindent 4 }}
    trino-goway.io/endpoint: metrics
  {{- with $svc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "trino-goway.routingService.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ $svc.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
