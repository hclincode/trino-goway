{{- if and .Values.routingService.enabled .Values.routingService.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "trino-goway.routingService.serviceAccountName" . }}
  labels:
    {{- include "trino-goway.routingService.labels" . | nindent 4 }}
  {{- with .Values.routingService.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
