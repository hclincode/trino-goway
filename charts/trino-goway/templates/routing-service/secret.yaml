{{- /*
Placeholder Secret for the routing-service. Phase-1 gRPC is INSECURE (no TLS),
so nothing is rendered unless future mTLS material is supplied via
routingService.secrets, and only when not using a BYO existingSecret. Kept as a
deliverable so the mTLS path (cert-manager / external-secrets) can slot in later.
*/ -}}
{{- if and .Values.routingService.enabled (not .Values.routingService.existingSecret) .Values.routingService.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trino-goway.routingService.fullname" . }}-secret
  labels:
    {{- include "trino-goway.routingService.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- toYaml .Values.routingService.secrets | nindent 2 }}
{{- end }}
