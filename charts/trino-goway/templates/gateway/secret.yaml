{{- if and .Values.trinoGoway.enabled (not .Values.trinoGoway.existingSecret) }}
{{- /*
The mounted gateway --config (full config.yaml, secrets filled in) lives here,
NOT in the ConfigMap: the gateway binary reads a single YAML file with no env
expansion, so cookie.secret / OIDC client secret / LDAP bind password /
backendState password must be in the file itself, which therefore must be a
Secret (R7). For the postgres driver, db.dsn stays password-less and the password
is the discrete `db-password` key injected via PGPASSWORD (lib/pq) so it never
lands in the config file. For the mysql driver (incl. MariaDB) the Go driver has
no PGPASSWORD equivalent, so the password is embedded in the DSN inside this
Secret's config.yaml (still a Secret, so not exposed); db-password is still
emitted but unused at runtime in that case.

Set trinoGoway.existingSecret to a BYO Secret (external-secrets/Vault) instead;
it must provide key `config.yaml` and (for postgres) the DB password under the key
named by trinoGoway.secretKeys.dbPassword (default `db-password`).
*/ -}}
{{- $dbPassword := include "trino-goway.gateway.dbPassword" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trino-goway.gateway.fullname" . }}-secret
  labels:
    {{- include "trino-goway.gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
{{ include "trino-goway.gateway.configYaml" (dict "ctx" . "withSecrets" true) | indent 4 }}
{{- with $dbPassword }}
  {{ include "trino-goway.gateway.dbPasswordKey" $ }}: {{ . | quote }}
{{- end }}
{{- end }}
