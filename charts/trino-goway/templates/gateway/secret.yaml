{{- if and .Values.trinoGoway.enabled (not .Values.trinoGoway.existingSecret) }}
{{- /*
The mounted gateway --config (full config.yaml, secrets filled in) lives here,
NOT in the ConfigMap: the gateway binary reads a single YAML file with no env
expansion, so cookie.secret / OIDC client secret / LDAP bind password /
backendState password must be in the file itself, which therefore must be a
Secret (R7). The DB password is the one exception — db.dsn stays password-less
and the password is exposed as the discrete `db-password` key, injected at
runtime via PGPASSWORD (lib/pq) so it never lands in the config file.

Set trinoGoway.existingSecret to a BYO Secret (external-secrets/Vault) instead;
it must provide keys `config.yaml` and (if a DB password is needed) `db-password`.
*/ -}}
{{- $dbPassword := .Values.trinoGoway.secrets.dbPassword -}}
{{- if and (not $dbPassword) .Values.postgresql.enabled -}}
{{- $dbPassword = .Values.postgresql.auth.password -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trino-goway.gateway.fullname" . }}-secret
  labels:
    {{- include "trino-goway.gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
{{ include "trino-goway.gateway.configYaml" (dict "ctx" . "withSecrets" true) | indent 4 }}
{{- with $dbPassword }}
  db-password: {{ . | quote }}
{{- end }}
{{- end }}
