{{- if and .Values.trinoGoway.enabled .Values.trinoGoway.serviceMonitor.enabled }}
{{- $sm := .Values.trinoGoway.serviceMonitor -}}
{{- /*
Prometheus-Operator ServiceMonitor scraping the gateway admin Service at
{metrics.path} on :8090. Requires the Prometheus-Operator CRDs. Non-Operator
clusters can instead rely on the pod scrape annotations (metrics.podAnnotations).
*/ -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "trino-goway.gateway.fullname" . }}
  labels:
    {{- include "trino-goway.gateway.labels" . | nindent 4 }}
    {{- with $sm.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "trino-goway.gateway.selectorLabels" . | nindent 6 }}
      trino-goway.io/endpoint: admin
  endpoints:
    - port: admin
      path: {{ .Values.trinoGoway.config.metrics.path | quote }}
      interval: {{ $sm.interval }}
      scrapeTimeout: {{ $sm.scrapeTimeout }}
      {{- with $sm.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $sm.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
