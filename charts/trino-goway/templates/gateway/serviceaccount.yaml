{{- if and .Values.trinoGoway.enabled .Values.trinoGoway.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "trino-goway.gateway.serviceAccountName" . }}
  labels:
    {{- include "trino-goway.gateway.labels" . | nindent 4 }}
  {{- with .Values.trinoGoway.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The gateway needs no Kubernetes API access; do not auto-mount the token.
automountServiceAccountToken: false
{{- end }}
