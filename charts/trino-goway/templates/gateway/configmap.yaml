{{- if .Values.trinoGoway.enabled }}
{{- /*
Non-secret rendering of the gateway config.yaml (R7/R9). Secret fields
(cookie.secret, OIDC client secret, LDAP bind password, backendState password)
are blanked here and the DB password is omitted from db.dsn — this object is a
diff/audit-friendly view of the configuration surface. Because the gateway binary
reads a single YAML file with no env expansion, the *mounted* --config (with
secrets filled in) is rendered into the companion Secret; see secret.yaml.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trino-goway.gateway.fullname" . }}
  labels:
    {{- include "trino-goway.gateway.labels" . | nindent 4 }}
data:
  config.yaml: |
{{ include "trino-goway.gateway.configYaml" (dict "ctx" . "withSecrets" false) | indent 4 }}
{{- end }}
