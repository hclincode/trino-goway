apiVersion: v2
name: trino-goway
description: |
  Umbrella chart for the trino-goway Trino gateway and its companion
  routing-service. Deploys the two as independently-scalable workloads from a
  single values file (camelCase `trinoGoway:` and `routingService:` sections).
type: application

# Chart semver. Bump on every chart change (independent of appVersion).
version: 0.1.0

# Tracks the trino-goway / routing-service application release the chart targets.
appVersion: "0.1.0"

kubeVersion: ">=1.24.0-0"

home: https://github.com/hclincode/trino-goway
sources:
  - https://github.com/hclincode/trino-goway
  - https://github.com/hclincode/trino-goway/tree/main/routing-service

keywords:
  - trino
  - gateway
  - proxy
  - routing
  - presto

maintainers:
  - name: trino-goway maintainers
    url: https://github.com/hclincode/trino-goway

# Optional bundled databases for dev/demo only (R8). Both disabled by default
# (enable at most one); the production path is an external database.
# Pulled from Bitnami's OCI registry so `helm dependency build` resolves them
# with no `helm repo add` (the classic https://charts.bitnami.com/bitnami index
# requires a repo definition and is deprecated post-2025).
dependencies:
  - name: postgresql
    version: ">=16.0.0 <17.0.0"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: mariadb
    version: ">=26.0.0 <27.0.0"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: mariadb.enabled
