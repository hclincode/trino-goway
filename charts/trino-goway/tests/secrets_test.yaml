suite: secrets (chart-managed vs existingSecret)
# The gateway Secret holds the full config.yaml (stringData) plus a discrete
# db-password key consumed via the PGPASSWORD env. existingSecret suppresses
# chart Secret creation and repoints the Deployment at the BYO Secret.
release:
  name: rel
  namespace: trino-goway
# No suite-level `templates:` scope: gateway/deployment.yaml `include`s the
# config templates for its checksum, so the whole chart must render. Assertions
# target templates explicitly.
tests:
  - it: creates a gateway Secret by default holding config.yaml and db-password
    set:
      trinoGoway.secrets.cookieSecret: "00000000000000000000000000000000"
      trinoGoway.secrets.dbPassword: "pgpw123"
    template: templates/gateway/secret.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: rel-trino-goway-gateway-secret
      - exists:
          path: stringData["config.yaml"]
      - equal:
          path: stringData["db-password"]
          value: pgpw123

  - it: inlines the cookie secret into config.yaml (not a discrete key)
    set:
      trinoGoway.secrets.cookieSecret: "cookieHMACvalue"
    template: templates/gateway/secret.yaml
    asserts:
      - matchRegex:
          path: stringData["config.yaml"]
          pattern: "secret:\\s*\"?cookieHMACvalue\"?"

  - it: skips creating a Secret when existingSecret is set
    set:
      trinoGoway.existingSecret: my-byo-secret
      trinoGoway.secrets.cookieSecret: "00000000000000000000000000000000"
    template: templates/gateway/secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: deployment references the existingSecret for config mount and PGPASSWORD
    set:
      trinoGoway.existingSecret: my-byo-secret
    template: templates/gateway/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.volumes[?(@.name=="config")].secret.secretName
          value: my-byo-secret
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name=="PGPASSWORD")].valueFrom.secretKeyRef.name
          value: my-byo-secret
