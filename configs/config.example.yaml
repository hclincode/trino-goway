# trino-goway example configuration
#
# Copy this file to config.yaml and adjust values for your environment.
# All fields shown here reflect their default values unless noted otherwise.
# Duration strings accept Go format: "30s", "1m", "1h30m".
# Size strings accept: B, KB, KiB, MB, MiB, GB, GiB.

# ---------------------------------------------------------------------------
# IMPORTANT: required Trino coordinator setting
# ---------------------------------------------------------------------------
# Each Trino cluster behind this gateway must have the following line in its
# config.properties:
#
#   http-server.process-forwarded=true
#
# Without it the coordinator builds nextUri from its own bind address instead
# of the gateway's X-Forwarded-* headers. Follow-up polls then bypass the
# gateway entirely; sticky routing breaks silently with no error returned.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# proxy — the main Trino-protocol listener
# ---------------------------------------------------------------------------
proxy:
  # Port that Trino clients connect to. Forward this port from your load balancer.
  port: 8080

  # Maximum response body buffered for POST /v1/statement replies.
  # Increase if your queries return very large initial result sets.
  responseSize: 1MiB

  # Hard deadline for a single proxied request (connect + headers + body).
  # Must exceed the longest expected Trino query submission round-trip.
  requestTimeout: 30s

# ---------------------------------------------------------------------------
# admin — internal management API (health, backends, metrics)
# ---------------------------------------------------------------------------
admin:
  # Port for /healthz, /readyz, /metrics, and the backend-management REST API.
  # Must differ from proxy.port. Do NOT expose this port to the public internet.
  port: 8090

# ---------------------------------------------------------------------------
# monitor — background backend health prober
# ---------------------------------------------------------------------------
monitor:
  # How often each backend is probed via GET /v1/info.
  interval: 30s

  # Per-probe HTTP timeout. Should be well below interval.
  checkTimeout: 5s

  # How often the active backend list is reloaded from the DB into the monitor's
  # probe set (independent of the probe cadence above). A backend added via the
  # admin API begins being probed on the next refresh, so lower values shorten the
  # add->HEALTHY latency (UC-MON-03) at the cost of more DB queries.
  refreshInterval: 15s

  # --- Cluster-stats knobs (UC-MON-02) ---
  # Used only by the UI_API / METRICS cluster-stats collectors below; the default
  # INFO_API (and NOOP) collectors ignore them and issue no extra HTTP.

  # Per-collection HTTP timeout (Java queryTimeout).
  statsTimeout: 10s

  # Retries on transport error per stats request (0 = no retry).
  retries: 0

  # METRICS collector: OpenMetrics endpoint path and the metric names to read.
  metricsEndpoint: /metrics
  runningQueriesMetricName: trino_execution_name_QueryManager_RunningQueries
  queuedQueriesMetricName: trino_execution_name_QueryManager_QueuedQueries

  # METRICS health gating. A backend is UNHEALTHY when any required metric is
  # absent, below its minimum, or above its maximum. Omit metricMinimumValues to
  # get the default below; set it to {} to disable the minimum gate entirely.
  metricMinimumValues:
    trino_metadata_name_DiscoveryNodeManager_ActiveNodeCount: 1
  metricMaximumValues: {}

# ---------------------------------------------------------------------------
# clusterStats — live per-backend queued/running query counts (UC-MON-02 / M7)
# ---------------------------------------------------------------------------
clusterStats:
  # Collector selection. Default INFO_API matches the Java gateway default and
  # the pre-Phase-12 behavior byte-for-byte: TrinoStatus is set from the health
  # probe, counts stay 0, no extra outbound HTTP.
  #   INFO_API  (default) — status only, counts 0, reuses the health verdict.
  #   NOOP                — zero counts, status UNKNOWN.
  #   UI_API              — live counts + worker count + per-user queued, via the
  #                         Trino Web-UI API (requires backendState below).
  #   METRICS             — live counts + status via the OpenMetrics endpoint
  #                         (requires backendState below).
  # JDBC and JMX are NOT supported in v1 (rejected at startup).
  monitorType: INFO_API

# ---------------------------------------------------------------------------
# backendState — credentials used by the UI_API / METRICS stats collectors
# ---------------------------------------------------------------------------
# Required only when clusterStats.monitorType is UI_API or METRICS. The default
# INFO_API / NOOP collectors do not read this block.
backendState:
  # Username for UI login (UI_API) or stats auth (METRICS).
  username: ""
  # Password. When set under METRICS, the collector sends Basic auth; when empty
  # it sends X-Trino-User instead.
  password: ""
  # Whether the backend's UI/metrics endpoint is served over TLS.
  ssl: false
  # When true, add "X-Forwarded-Proto: https" to the UI GETs / metrics request.
  xForwardedProtoHeader: false

# ---------------------------------------------------------------------------
# db — persistent store for query history and backend registry
# ---------------------------------------------------------------------------
db:
  # Supported drivers: "postgres", "mysql".
  # Leave blank to run without persistence (backends must be supplied via the
  # admin API on every restart, and query-history routing will not work).
  driver: postgres

  # Data-source name in the driver's standard format.
  # Postgres example: "host=localhost port=5432 dbname=trino_gateway user=gw password=secret sslmode=disable"
  # MySQL   example: "gw:secret@tcp(localhost:3306)/trino_gateway?parseTime=true"
  dsn: "host=localhost port=5432 dbname=trino_gateway user=gw password=secret sslmode=disable"

  # Run embedded goose migrations on startup. Default true. Migrations are
  # guarded by a database advisory lock, so it is safe for many replicas to boot
  # with autoMigrate enabled — they serialize and the schema is applied once.
  # Set false when an external migrate job (e.g. a Helm pre-upgrade hook) owns
  # migrations and the running replicas should skip them.
  autoMigrate: true

# ---------------------------------------------------------------------------
# routing — how inbound requests are assigned to a backend cluster
# ---------------------------------------------------------------------------
routing:
  # Routing group used when no group can be determined from the request.
  defaultGroup: default

  # Routing engine. "EXTERNAL" is the only supported type.
  # The external service receives a subset of request headers and returns a
  # routing-group name (HTTP) or a RouteResponse (gRPC).
  type: EXTERNAL

  external:
    # HTTP endpoint of the routing service (mutually exclusive with grpcAddr).
    # The gateway POSTs a JSON body with the request headers and expects a
    # plain-text routing-group name in the response body.
    #
    # Both url and grpcAddr are OPTIONAL. If neither is set the gateway skips
    # the external call entirely and routes every request to defaultGroup,
    # picking any active backend in that group. This is sufficient for
    # single-cluster or dev/test deployments.
    #
    # url: "http://localhost:9000/route"

    # gRPC address of the routing service (mutually exclusive with url).
    # Format: "host:port"  — TLS is not yet supported.
    # grpcAddr: "localhost:9001"

    # Timeout for a single routing call.
    timeout: 1s

    # Headers stripped before forwarding to the routing service AND from
    # the X-Trino-Gateway-External-Headers response. Use this to prevent
    # sensitive credentials from leaking to the router.
    excludeHeaders:
      - Authorization
      - X-Trino-Client-Secret

# ---------------------------------------------------------------------------
# auth — authentication for the admin API and (optionally) proxy requests
# ---------------------------------------------------------------------------
auth:
  # Authentication backend. Options:
  #   "NOOP" — no authentication; every caller is granted USER role (dev/test only)
  #   "OIDC" — validate Bearer tokens against a JSON Web Key Set
  #   "LDAP" — bind-and-search against an LDAP/AD directory
  type: NOOP

  # --- OIDC (only read when type: OIDC) ---
  oidc:
    # Base URL of the OIDC provider (used for discovery if jwksUrl is omitted).
    issuerUrl: "https://accounts.example.com"

    # OAuth2 client credentials (used for token introspection if needed).
    clientId: "trino-gateway"
    clientSecret: "change-me"

    # Explicit JWKS endpoint. Required when type is OIDC.
    jwksUrl: "https://accounts.example.com/.well-known/jwks.json"

    # How long to cache the JWKS before re-fetching. Seconds.
    jwksTtlSecs: 300

    # OAuth2 scopes requested during the authorization code flow.
    scopes:
      - openid
      - profile
      - email

    # --- Web-UI interactive login (authorization-code flow) ---
    # Absolute URL of this gateway's /oidc/callback, registered with the IdP as an
    # allowed redirect URI. Required to enable the browser SSO login (/sso). When
    # omitted, /sso reports "SSO not configured" and only Bearer-token API auth works.
    redirectUrl: "https://gateway.example.com/oidc/callback"

    # Optional explicit endpoints. When omitted, they are resolved from
    # {issuerUrl}/.well-known/openid-configuration.
    # authorizationEndpoint: "https://accounts.example.com/authorize"
    # tokenEndpoint: "https://accounts.example.com/token"

  # --- LDAP (only read when type: LDAP) ---
  ldap:
    # LDAP server URL. Use ldaps:// for TLS.
    url: "ldap://ldap.example.com:389"

    # Service-account DN used for the initial bind.
    bindDn: "cn=svc-gw,ou=serviceaccounts,dc=example,dc=com"
    bindPassword: "change-me"

    # Base DN under which user entries are searched.
    userBase: "ou=users,dc=example,dc=com"

    # LDAP attribute that holds the username (matched against X-Trino-User).
    userAttr: uid

  # --- Role assignment (applies to OIDC and LDAP) ---
  # Each value is a Java-compatible regex matched against the principal's
  # memberOf string (comma-joined list of group DNs / claim values).
  authorization:
    # Groups matching this regex receive the ADMIN role (full admin API access).
    admin: "cn=trino-admins,.*"

    # Groups matching this regex receive the USER role (proxy + read-only admin).
    user: "cn=trino-users,.*"

    # Groups matching this regex receive the API role (programmatic access only).
    api: "cn=trino-api,.*"

    # Optional per-role UI page permissions. Maps a role (ADMIN/USER/API) to an
    # underscore-separated list of page keys that role may see in the web UI
    # sidebar. The resolved per-user union is returned in /userinfo's permissions.
    # A role with no entry here grants all pages. Omit the whole block to allow
    # every page for every role.
    # pagePermissions:
    #   ADMIN: "dashboard_cluster_history_routingRules"
    #   USER: "dashboard_history"

# ---------------------------------------------------------------------------
# ui — web UI feature flags (surfaced by getUIConfiguration)
# ---------------------------------------------------------------------------
ui:
  # Page keys globally hidden from the web UI sidebar. Page keys:
  # dashboard, cluster, history, routingRules. Default: none hidden.
  disablePages: []

# ---------------------------------------------------------------------------
# cookie — session cookie used to pin multi-statement queries to a backend
# ---------------------------------------------------------------------------
cookie:
  # HMAC-SHA256 signing secret for the gateway session cookie.
  # Must be the same across all gateway instances in a cluster.
  # Generate with: openssl rand -hex 32
  secret: "change-me-use-openssl-rand-hex-32"

  # How long a session cookie remains valid. Should exceed the longest
  # expected Trino query execution time.
  ttl: 10m

  # Keep wire format compatible with the Java trino-gateway cookie encoding.
  # Set to false only if all clients are exclusively talking to this Go gateway.
  wireCompat: true

# ---------------------------------------------------------------------------
# metrics — Prometheus exposition (admin listener only)
# ---------------------------------------------------------------------------
metrics:
  # Expose the Prometheus /metrics endpoint. When false, the route is not
  # registered and returns 404. Default: true.
  enabled: true

  # Path the metrics endpoint is mounted at, on the admin listener.
  # Must start with "/". Default: /metrics.
  path: /metrics
